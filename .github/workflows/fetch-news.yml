name: Fetch Design AI News

on:
  schedule:
    - cron: '15 */3 * * *'   # Every 3 hours at :15 (00:15, 03:15, 06:15...)
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

permissions:
  contents: write             # Needed to commit data/articles.json

concurrency:
  group: fetch-news           # Only one run at a time — cancel any queued duplicate
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch news from Google News RSS
        run: node scripts/fetch-news.mjs || (echo "Fetch failed — see output above" && exit 1)

      - name: Commit updated articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the freshly fetched articles, sync to latest remote, then commit on top
          cp docs/data/articles.json /tmp/articles.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p docs/data
          cp /tmp/articles.json docs/data/articles.json
          git add docs/data/articles.json
          if git diff --staged --quiet; then
            echo "No new articles — nothing to commit"
          else
            ARTICLE_COUNT=$(node -e "const d=require('./data/articles.json'); console.log(d.total)")
            git commit -m "chore: sync design AI news — ${ARTICLE_COUNT} articles [skip ci]"
            git push
          fi
