<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design × AI — News Intelligence</title>
  <meta name="description" content="Latest AI-in-Design news, auto-synced every 3 hours from across the web." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0d0c14; --ink2: #3d3a52; --muted: #7b7896;
      --bg:     #f7f6fb; --card: #ffffff; --border: #eceaf5;
      --accent: #6e3cf8; --accent2: #c026d3;
      --green:  #22c55e; --radius: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --ink:#f0eeff; --ink2:#c4bfe8; --bg:#0e0c1a; --card:#161228; --border:#271f42; }
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--ink); min-height: 100svh; -webkit-font-smoothing: antialiased; }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(16px,4vw,40px); height: 60px; gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; letter-spacing:-.4px; }
    .brand-icon { width:32px; height:32px; border-radius:10px; flex-shrink:0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:grid; place-items:center; font-size:16px; }
    .brand-sub { font-weight:400; color:var(--muted); font-size:12px; }
    .header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .pill { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px;
      font-size:12px; font-weight:500; border:1px solid var(--border); background:var(--card); }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
    .gh-link { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px;
      font-size:12px; font-weight:600; color:var(--accent); border:1px solid var(--border);
      background:var(--card); text-decoration:none; transition:all .15s; }
    .gh-link:hover { background:var(--accent); color:white; border-color:var(--accent); }

    /* Hero */
    .hero { max-width:1200px; margin:0 auto; padding:clamp(28px,5vw,56px) clamp(16px,4vw,40px) 20px; }
    .hero-grid { display:grid; grid-template-columns:1fr auto; align-items:end; gap:24px; }
    @media(max-width:600px){ .hero-grid{grid-template-columns:1fr; gap:16px;} }
    .hero-title { font-size:clamp(26px,5vw,44px); font-weight:900; letter-spacing:-1px; line-height:1.05; }
    .grad { background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-sub { margin-top:8px; font-size:14px; color:var(--muted); line-height:1.6; }
    .stats { display:flex; gap:20px; justify-content:flex-end; }
    @media(max-width:600px){ .stats{justify-content:flex-start;} }
    .stat-val { font-size:28px; font-weight:900; letter-spacing:-1px; line-height:1; }
    .stat-key { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; }

    /* Filters */
    .filters { max-width:1200px; margin:0 auto; padding:16px clamp(16px,4vw,40px);
      display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .search { flex:1; min-width:180px; position:relative; }
    .search svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    .search input { width:100%; padding:8px 12px 8px 36px; border:1px solid var(--border); border-radius:20px;
      font-size:13px; background:var(--card); color:var(--ink); outline:none; transition:border-color .15s; }
    .search input:focus { border-color:var(--accent); }
    .search input::placeholder { color:var(--muted); }
    .chips { display:flex; gap:5px; flex-wrap:wrap; }
    .chip { padding:5px 13px; border-radius:20px; font-size:12px; font-weight:500;
      border:1px solid var(--border); background:var(--card); color:var(--muted);
      cursor:pointer; transition:all .12s; white-space:nowrap; }
    .chip:hover { border-color:var(--accent); color:var(--accent); }
    .chip.on { background:var(--accent); color:white; border-color:var(--accent); }
    .date-chips { display:flex; gap:5px; }

    /* Grid */
    .main { max-width:1200px; margin:0 auto; padding:0 clamp(16px,4vw,40px) 60px; }
    .count { font-size:12px; color:var(--muted); margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr)); gap:14px; }

    /* Card */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:18px 18px 14px; display:flex; flex-direction:column; gap:10px;
      text-decoration:none; color:inherit; position:relative; overflow:hidden;
      transition:box-shadow .15s, transform .15s, border-color .15s; }
    .card::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity .15s; }
    .card:hover { box-shadow:0 4px 20px rgba(110,60,248,.1); transform:translateY(-2px); }
    .card:hover::before { opacity:1; }
    .card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .card-source { display:flex; align-items:center; gap:6px; min-width:0; }
    .badge { font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;
      background:linear-gradient(90deg,rgba(110,60,248,.15),rgba(192,38,211,.15));
      color:var(--accent); flex-shrink:0; text-transform:uppercase; letter-spacing:.3px; }
    .source-name { font-size:11px; font-weight:600; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-time { font-size:11px; color:var(--muted); flex-shrink:0; }
    .card-title { font-size:14px; font-weight:700; line-height:1.45; letter-spacing:-.1px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-summary { font-size:12px; color:var(--ink2); line-height:1.65;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; flex:1; }
    .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:4px; }
    .tags { display:flex; gap:4px; flex-wrap:wrap; }
    .tag { font-size:10px; font-weight:500; padding:2px 8px; border-radius:8px; }
    .tag-ai-tools{background:rgba(109,40,217,.12);color:#6d28d9;}
    .tag-ux{background:rgba(5,150,105,.12);color:#059669;}
    .tag-ui{background:rgba(29,78,216,.12);color:#1d4ed8;}
    .tag-motion{background:rgba(157,23,77,.12);color:#9d174d;}
    .tag-tools{background:rgba(146,64,14,.12);color:#92400e;}
    .tag-branding{background:rgba(126,34,206,.12);color:#7e22ce;}
    .tag-web{background:rgba(3,105,161,.12);color:#0369a1;}
    .tag-design{background:rgba(71,85,105,.12);color:#475569;}
    .ext-icon { color:var(--muted); flex-shrink:0; }

    /* Skeleton */
    .skeleton { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; display:flex; flex-direction:column; gap:10px; }
    .sk { background:var(--border); border-radius:4px; animation:shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}
    .sk-xs{height:10px;width:40%}.sk-sm{height:12px;width:90%}.sk-md{height:12px;width:70%}.sk-body{height:10px;width:100%}

    /* Message */
    .msg { grid-column:1/-1; text-align:center; padding:64px 24px; color:var(--muted); }
    .msg-icon { font-size:40px; margin-bottom:12px; }
    .msg h3 { font-size:16px; color:var(--ink); margin-bottom:6px; }
    .msg p { font-size:13px; line-height:1.6; max-width:420px; margin:0 auto; }

    /* Sync badge */
    .sync-info { display:inline-flex; align-items:center; gap:4px; font-size:11px;
      color:var(--muted); padding:3px 8px; border-radius:8px; border:1px solid var(--border);
      background:var(--card); margin-top:6px; }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">✦</div>
    Design × AI
    <span class="brand-sub">/ News</span>
  </div>
  <div class="header-right">
    <div class="pill"><span class="dot"></span><span id="syncAge">Loading…</span></div>
    <a class="gh-link" href="../../" id="ghLink">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      View on GitHub
    </a>
  </div>
</header>

<div class="hero">
  <div class="hero-grid">
    <div>
      <h1 class="hero-title">AI in the world of<br><span class="grad">Design</span></h1>
      <p class="hero-sub" id="heroSub">Latest news from across the web — auto-synced every 3 hours via GitHub Actions</p>
      <div class="sync-info" id="syncInfo">⟳ syncing every 3h via GitHub Actions</div>
    </div>
    <div class="stats">
      <div><div class="stat-val" id="statCount">—</div><div class="stat-key">Articles</div></div>
      <div><div class="stat-val" id="statBeats">—</div><div class="stat-key">Beats</div></div>
    </div>
  </div>
</div>

<div class="filters">
  <div class="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" placeholder="Search design AI news…" id="searchInput" oninput="handleSearch()" />
  </div>
  <div class="date-chips chips">
    <button class="chip" data-days="1" onclick="setDays(this)">24h</button>
    <button class="chip on" data-days="7" onclick="setDays(this)">7 days</button>
    <button class="chip" data-days="30" onclick="setDays(this)">30 days</button>
    <button class="chip" data-days="0" onclick="setDays(this)">All time</button>
  </div>
  <div class="chips">
    <button class="chip on" data-cat="" onclick="setCat(this)">All</button>
    <button class="chip" data-cat="ai-tools" onclick="setCat(this)">AI Tools</button>
    <button class="chip" data-cat="ux" onclick="setCat(this)">UX</button>
    <button class="chip" data-cat="ui" onclick="setCat(this)">UI</button>
    <button class="chip" data-cat="motion" onclick="setCat(this)">Motion</button>
    <button class="chip" data-cat="tools" onclick="setCat(this)">Tools</button>
    <button class="chip" data-cat="branding" onclick="setCat(this)">Branding</button>
    <button class="chip" data-cat="web" onclick="setCat(this)">Web</button>
  </div>
</div>

<div class="main">
  <div class="count" id="countLabel"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
  let allArticles = [], filteredArticles = []
  let activeCat = '', activeDays = 7, searchTimer = null

  function relTime(iso) {
    if (!iso) return ''
    const d = (Date.now() - new Date(iso)) / 1000
    if (d < 3600) return Math.round(d/60) + 'm ago'
    if (d < 86400) return Math.round(d/3600) + 'h ago'
    return Math.round(d/86400) + 'd ago'
  }

  function tagClass(cat) {
    const m = {
      'ai-tools':'ai-tools', ux:'ux', ui:'ui', motion:'motion',
      tools:'tools', branding:'branding', web:'web'
    }
    return 'tag tag-' + (m[cat] || 'design')
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function renderCard(a) {
    const cats = [a.category].filter(Boolean)
    return `
      <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" class="card">
        <div class="card-top">
          <div class="card-source">
            <span class="badge">✦ Web</span>
            <span class="source-name">${esc(a.source || a.beat)}</span>
          </div>
          <span class="card-time">${relTime(a.publishedDate)}</span>
        </div>
        <div class="card-title">${esc(a.title)}</div>
        ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ''}
        <div class="card-footer">
          <div class="tags">${cats.map(c=>`<span class="${tagClass(c)}">${esc(c)}</span>`).join('')}</div>
          <svg class="ext-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </div>
      </a>`
  }

  function renderSkeletons() {
    document.getElementById('grid').innerHTML = Array.from({length:12}).map(()=>`
      <div class="skeleton">
        <div class="sk sk-xs"></div><div class="sk sk-sm"></div>
        <div class="sk sk-md"></div><div class="sk sk-body"></div>
        <div class="sk sk-body" style="width:75%"></div>
      </div>`).join('')
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase()
    const cutoff = activeDays ? new Date(Date.now() - activeDays * 86400000) : null

    filteredArticles = allArticles.filter(a => {
      if (activeCat && a.category !== activeCat) return false
      if (cutoff && a.publishedDate && new Date(a.publishedDate) < cutoff) return false
      if (q && !(a.title+' '+a.summary+' '+a.source).toLowerCase().includes(q)) return false
      return true
    })

    const grid = document.getElementById('grid')
    if (!filteredArticles.length) {
      grid.innerHTML = `<div class="msg"><div class="msg-icon">✦</div><h3>No results</h3>
        <p>Try broadening the date range or clearing the search.</p></div>`
    } else {
      grid.innerHTML = filteredArticles.map(renderCard).join('')
    }
    document.getElementById('countLabel').textContent =
      `${filteredArticles.length.toLocaleString()} article${filteredArticles.length !== 1 ? 's' : ''}`
  }

  function setCat(el) {
    document.querySelectorAll('.chips:last-of-type .chip').forEach(c=>c.classList.remove('on'))
    el.classList.add('on'); activeCat = el.dataset.cat; applyFilters()
  }

  function setDays(el) {
    document.querySelectorAll('.date-chips .chip').forEach(c=>c.classList.remove('on'))
    el.classList.add('on'); activeDays = parseInt(el.dataset.days); applyFilters()
  }

  function handleSearch() {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(applyFilters, 250)
  }

  async function init() {
    renderSkeletons()

    // Set GitHub repo link dynamically
    const origin = location.origin
    const pathParts = location.pathname.split('/').filter(Boolean)
    if (pathParts.length >= 1) {
      const repoName = pathParts[0]
      document.getElementById('ghLink').href = `https://github.com/${repoName}`
    }

    try {
      const res = await fetch('./data/articles.json')
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
      const data = await res.json()

      allArticles = data.articles || []
      document.getElementById('statCount').textContent = allArticles.length.toLocaleString()
      document.getElementById('statBeats').textContent = data.beats || BEATS?.length || '18'

      if (data.fetchedAt) {
        const age = relTime(data.fetchedAt)
        document.getElementById('syncAge').textContent = `Synced ${age}`
        document.getElementById('syncInfo').textContent = `⟳ Last synced ${age} · updates every 3h`
        document.getElementById('heroSub').textContent =
          `${allArticles.length.toLocaleString()} articles from ${data.beats} design AI beats — refreshed ${age}`
      }

      applyFilters()
    } catch (err) {
      document.getElementById('grid').innerHTML = `
        <div class="msg">
          <div class="msg-icon">⚠️</div>
          <h3>Data not yet available</h3>
          <p>The GitHub Action hasn't run yet. Go to <strong>Actions → Fetch Design AI News → Run workflow</strong> to trigger the first sync.</p>
        </div>`
      document.getElementById('countLabel').textContent = ''
      document.getElementById('syncAge').textContent = 'Not synced yet'
    }
  }

  init()
</script>
</body>
</html>
